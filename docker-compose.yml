services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: judilen
      POSTGRES_USER: judilen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-judilen}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judilen -d judilen"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://judilen:${POSTGRES_PASSWORD:-judilen}@db:5432/judilen
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@judilen.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
      SEED_ADMIN_RESET_PASSWORD: ${SEED_ADMIN_RESET_PASSWORD:-false}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_URL: ${APP_URL:-https://judilen.digitaleasyup.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://judilen.digitaleasyup.com}
    restart: unless-stopped
    environment:
    
      NODE_ENV: production
      DATABASE_URL: postgres://judilen:${POSTGRES_PASSWORD:-judilen}@db:5432/judilen
      APP_URL: ${APP_URL:-https://judilen.digitaleasyup.com}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-at-least-32-random-characters}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://judilen.digitaleasyup.com}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/apps/web/public/uploads}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      ICAL_SYNC_CRON_SECRET: ${ICAL_SYNC_CRON_SECRET:-}
      NOTIFICATION_CRON_SECRET: ${NOTIFICATION_CRON_SECRET:-replace-with-a-random-cron-secret}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-disabled}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-booking@example.com}
    expose:
      - "3000"
    networks:
      - default
      - proxy
    volumes:
      - uploads:/app/apps/web/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NOTIFICATION_CRON_SECRET: ${NOTIFICATION_CRON_SECRET:-replace-with-a-random-cron-secret}
    command:
      - sh
      - -c
      - |-
        while true; do
          wget -qO- \
            --header="Authorization: Bearer $$NOTIFICATION_CRON_SECRET" \
            --post-data="" \
            http://app:3000/api/cron/arrival-reminders || true
          sleep 3600
        done
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:

networks:
  proxy:
    external: true
