services:
  secret-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: secret-init
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-judilen}
      AUTH_SECRET: ${AUTH_SECRET:-}
      NOTIFICATION_CRON_SECRET: ${NOTIFICATION_CRON_SECRET:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_ADMIN_RESET_PASSWORD: ${SEED_ADMIN_RESET_PASSWORD:-false}
    volumes:
      - runtime_secrets:/run/runtime-secrets
    restart: "no"

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: judilen
      POSTGRES_USER: judilen
      POSTGRES_PASSWORD_FILE: /run/runtime-secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - runtime_secrets:/run/runtime-secrets:ro
    depends_on:
      secret-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judilen -d judilen"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      NODE_ENV: production
      RUNTIME_SECRET_PROFILE: migrator
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@judilen.local}
      SEED_ADMIN_RESET_PASSWORD: ${SEED_ADMIN_RESET_PASSWORD:-false}
    volumes:
      - runtime_secrets:/run/runtime-secrets:ro
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_URL: ${APP_URL:-https://judilen.digitaleasyup.com}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://judilen.digitaleasyup.com}
        PUBLIC_IMAGE_HOSTS: ${PUBLIC_IMAGE_HOSTS:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      RUNTIME_SECRET_PROFILE: app
      APP_URL: ${APP_URL:-https://judilen.digitaleasyup.com}
      COMMUNICATION_ENCRYPTION_KEY: ${COMMUNICATION_ENCRYPTION_KEY:-}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v25.0}
      VK_GROUP_ID: ${VK_GROUP_ID:-}
      VK_CONFIRMATION_TOKEN: ${VK_CONFIRMATION_TOKEN:-}
      VK_SECRET_KEY: ${VK_SECRET_KEY:-}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://judilen.digitaleasyup.com}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/storage/uploads}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      PUBLIC_IMAGE_HOSTS: ${PUBLIC_IMAGE_HOSTS:-}
      CHAT_ATTACHMENT_DIR: ${CHAT_ATTACHMENT_DIR:-/app/storage/chat-attachments}
      ICAL_SYNC_CRON_SECRET: ${ICAL_SYNC_CRON_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-disabled}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-booking@example.com}
    expose:
      - "3000"
    networks:
      - default
      - proxy
    volumes:
      - uploads:${UPLOAD_DIR:-/app/storage/uploads}
      - chat_attachments:/app/storage/chat-attachments
      - runtime_secrets:/run/runtime-secrets:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      RUNTIME_SECRET_PROFILE: notification-worker
    volumes:
      - runtime_secrets:/run/runtime-secrets:ro
    command:
      - sh
      - -c
      - |-
        while true; do
          wget -qO- \
            --header="Authorization: Bearer $$NOTIFICATION_CRON_SECRET" \
            --post-data="" \
            http://app:3000/api/cron/arrival-reminders || true
          sleep 3600
        done
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
  chat_attachments:
  runtime_secrets:

networks:
  proxy:
    external: true
