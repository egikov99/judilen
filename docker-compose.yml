services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: judilen
      POSTGRES_USER: judilen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-judilen}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judilen -d judilen"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    env_file: ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgres://judilen:${POSTGRES_PASSWORD:-judilen}@db:5432/judilen
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgres://judilen:${POSTGRES_PASSWORD:-judilen}@db:5432/judilen
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - uploads:/app/apps/web/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads:
