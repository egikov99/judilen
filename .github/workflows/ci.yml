name: CI and deploy

on:
  push:
    branches: [dev, production]
  pull_request:
    branches: [dev, production]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: judilen_test
          POSTGRES_USER: judilen
          POSTGRES_PASSWORD: judilen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U judilen -d judilen_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://judilen:judilen@localhost:5432/judilen_test
      AUTH_SECRET: ci-only-secret-at-least-32-characters-long
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: docker build -t judilen:${{ github.sha }} .

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer webhook
        run: |
          test -n "$PORTAINER_WEBHOOK_URL"
          curl -fsSL -X POST "$PORTAINER_WEBHOOK_URL"
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
