# Production deployment is intentionally isolated from dev CI.
# It runs only after a reviewed dev -> main merge produces a push to main.
name: Production

on:
  push:
    branches:
      - main

# Repository Actions settings should use "Read and write permissions".
# The workflow does not merge or push branches automatically.
permissions:
  contents: write
  checks: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  verify-production:
    name: Verify production artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: judilen_test
          POSTGRES_USER: judilen
          POSTGRES_PASSWORD: judilen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U judilen -d judilen_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://judilen:judilen@localhost:5432/judilen_test
      AUTH_SECRET: ci-only-secret-at-least-32-characters-long
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate database migrations
        run: pnpm db:migrate

      - name: Seed test database
        run: pnpm db:seed

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

      # Parse and normalize Compose before building any image.
      - name: Validate Docker Compose
        run: ENV_FILE=.env.example docker compose config --quiet

      # BuildKit validates Dockerfile instructions and build checks without
      # publishing an image.
      - name: Check Dockerfile
        run: docker buildx build --check .

      - name: Build migration image
        run: docker build --target migrator --tag judilen-migrator:${{ github.sha }} .

      - name: Build application image
        run: docker build --tag judilen:${{ github.sha }} .

  deploy:
    name: Trigger Portainer
    runs-on: ubuntu-latest
    needs:
      - verify-production
    if: ${{ success() }}
    environment: production
    timeout-minutes: 5

    steps:
      # This job cannot start until every verification and Docker step above
      # has completed successfully.
      - name: Trigger Portainer
        run: |
          test -n "$PORTAINER_WEBHOOK_URL"
          curl -fsSL -X POST "$PORTAINER_WEBHOOK_URL"
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
