# Production deployment: push main -> verify -> build image -> Portainer.
# This workflow never merges or pushes branches.
name: Production

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  production:
    name: Test, build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: judilen
          POSTGRES_PASSWORD: judilen
          POSTGRES_DB: judilen_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U judilen -d judilen_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://judilen:judilen@localhost:5432/judilen_test
      AUTH_SECRET: ci-only-secret-at-least-32-characters-long
      SEED_ADMIN_EMAIL: admin@judilen.local
      SEED_ADMIN_PASSWORD: ci-only-admin-password
      SEED_ADMIN_RESET_PASSWORD: "false"
      RUN_DB_INTEGRATION_TESTS: "true"
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # pnpm must be available before setup-node resolves the pnpm cache path.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Seed database
        run: pnpm db:seed

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate Docker Compose
        run: docker compose config

      # A successful image build validates the Dockerfile and the final image.
      - name: Build Docker image
        run: docker build -t judilen-app .

      # This is the final step, so it can only run after every check above.
      - name: Trigger Portainer webhook
        if: success()
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "::error::PORTAINER_WEBHOOK_URL repository secret is not configured"
            exit 1
          fi
          curl --fail-with-body --silent --show-error -X POST "$PORTAINER_WEBHOOK_URL"
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
